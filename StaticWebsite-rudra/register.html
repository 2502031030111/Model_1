<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fashion Store - Register</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
      linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
      url('https://images.unsplash.com/photo-1445205170230-053b83016050?q=80&w=1200&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
    }

    .register-container{
      width:420px;
      background:rgba(255,255,255,0.96);
      padding:35px;
      border-radius:15px;
      box-shadow:0 8px 25px rgba(0,0,0,0.3);
    }

    .logo{
      text-align:center;
      font-size:32px;
      font-weight:bold;
      margin-bottom:10px;
      color:#111;
    }

    .logo span{
      color:#ff5722;
    }

    h2{
      text-align:center;
      margin-bottom:25px;
      color:#333;
    }

    .input-box{
      margin-bottom:18px;
    }

    .input-box input{
      width:100%;
      padding:14px;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
      font-size:15px;
      transition:0.3s;
    }

    .input-box input:focus{
      border-color:#ff5722;
      box-shadow:0 0 5px rgba(255,87,34,0.4);
    }

    .btn{
      width:100%;
      padding:14px;
      background:#ff5722;
      border:none;
      color:white;
      font-size:16px;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#e64a19;
    }

    .login-link{
      text-align:center;
      margin-top:20px;
      font-size:14px;
    }

    .login-link a{
      text-decoration:none;
      color:#ff5722;
      font-weight:600;
    }

  </style>
</head>
<body>

  <div class="register-container">

    <div class="logo">
      Fashion<span>Hub</span>
    </div>

    <h2>Create Your Account</h2>

    <form>

      <div class="input-box">
        <input type="text" placeholder="Full Name" required>
      </div>

      <div class="input-box">
        <input type="email" placeholder="Email Address" required>
      </div>

      <div class="input-box">
        <input type="tel" placeholder="Phone Number" required>
      </div>

      <div class="input-box">
        <input type="password" placeholder="Create Password" required>
      </div>

      <div class="input-box">
        <input type="password" placeholder="Confirm Password" required>
      </div>

      <button type="submit" class="btn">Create Account</button>

      <div class="login-link">
        Already have an account?
        <a href="#">Login</a>
      </div>

    </form>

  </div>

</body>
</html>
