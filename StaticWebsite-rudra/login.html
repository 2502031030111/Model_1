<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FashionHub- Login</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
      linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
      url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?q=80&w=1200&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
    }

    .login-container{
      width:380px;
      background:rgba(255,255,255,0.95);
      padding:40px;
      border-radius:15px;
      box-shadow:0 8px 25px rgba(0,0,0,0.3);
    }

    .logo{
      text-align:center;
      margin-bottom:10px;
      font-size:32px;
      font-weight:bold;
      color:#111;
    }

    .logo span{
      color:#e91e63;
    }

    h2{
      text-align:center;
      margin-bottom:30px;
      color:#333;
    }

    .input-box{
      margin-bottom:20px;
    }

    .input-box input{
      width:100%;
      padding:14px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:15px;
      outline:none;
      transition:0.3s;
    }

    .input-box input:focus{
      border-color:#e91e63;
      box-shadow:0 0 5px rgba(233,30,99,0.5);
    }

    .forgot{
      text-align:right;
      margin-bottom:20px;
    }

    .forgot a{
      text-decoration:none;
      color:#e91e63;
      font-size:14px;
    }

    .btn{
      width:100%;
      padding:14px;
      border:none;
      background:#e91e63;
      color:white;
      font-size:16px;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#c2185b;
    }

    .register-link{
      text-align:center;
      margin-top:20px;
      font-size:14px;
    }

    .register-link a{
      text-decoration:none;
      color:#e91e63;
      font-weight:600;
    }

  </style>
</head>
<body>

  <div class="login-container">

    <div class="logo">
      Fashion<span>Hub</span>
    </div>

    <h2>Login to Your Account</h2>

    <form>

      <div class="input-box">
        <input type="email" placeholder="Email Address" required>
      </div>

      <div class="input-box">
        <input type="password" placeholder="Password" required>
      </div>

      <div class="forgot">
        <a href="#">Forgot Password?</a>
      </div>

      <button type="submit" class="btn">Login</button>

      <div class="register-link">
        Don't have an account?
        <a href="#">Register</a>
      </div>

    </form>

  </div>

</body>
</html>
